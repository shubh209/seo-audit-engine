name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-worker:
    name: Worker Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm install
        working-directory: worker

      - name: Run worker tests
        run: npm test
        working-directory: worker

  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm install
        working-directory: api

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://fake:fake@localhost/fake
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
        run: npm test
        working-directory: api

  deploy-check:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [test-worker, test-api]

    steps:
      - name: All tests passed
        run: echo "All tests passed — safe to deploy"